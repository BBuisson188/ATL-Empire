<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#173d2d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="ATL Empire">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>ATL Empire</title>
  <link rel="manifest" href="manifest.json?v=20260424e">
  <link rel="apple-touch-icon" href="assets/branding/atl-empire-icon-small.png">
  <link rel="stylesheet" href="styles.css?v=20260424e">
</head>
<body>
  <div id="app" class="app-shell">
    <section id="setup" class="setup-screen" aria-labelledby="setup-title">
      <div class="setup-copy">
        <p class="eyebrow">Atlanta property trading game</p>
        <p class="build-stamp">Build 2026.04.24e</p>
        <img class="brand-logo setup-logo" src="assets/branding/atl-empire-logo-setup-small-v2.png" alt="ATL Empire logo featuring Arthur Blank and Tyler Perry as Monopoly-style tycoons">
        <h1 id="setup-title" class="sr-only">ATL Empire</h1>
        <p class="intro">Circle Peachtree Street, collect districts, dodge I-285 traffic, and hope the Georgia Lottery pot lands your way.</p>
      </div>

      <form id="setup-form" class="setup-panel">
        <label>
          Game name
          <input id="game-name" type="text" value="ATL Empire" maxlength="32">
        </label>

        <div class="form-grid">
          <label>
            Human players
            <select id="human-count">
              <option value="1">1</option>
              <option value="2" selected>2</option>
              <option value="3">3</option>
              <option value="4">4</option>
            </select>
          </label>
          <label>
            AI players
            <select id="bot-count">
              <option value="0">0</option>
              <option value="1">1</option>
              <option value="2" selected>2</option>
              <option value="3">3</option>
            </select>
          </label>
        </div>

        <div id="player-configs" class="player-configs"></div>

        <label class="toggle-line">
          <input id="lottery-toggle" type="checkbox" checked>
          Georgia Lottery pot collects taxes and card fines
        </label>

        <button type="submit" class="primary-action">Start game</button>
      </form>

      <section id="saved-games-panel" class="setup-panel saved-games-panel hidden" aria-labelledby="saved-games-title">
        <div class="saved-games-head">
          <div>
            <p class="eyebrow">Saved Games</p>
            <h2 id="saved-games-title">Continue a saved game</h2>
          </div>
        </div>
        <div id="saved-games-list" class="saved-games-list"></div>
      </section>
    </section>

    <section id="game" class="game-screen hidden" aria-label="Game board">
      <header class="top-bar">
        <div class="top-brand"><h1 id="game-title" class="sr-only">ATL Empire</h1></div>
        <div class="top-actions">
          <button id="play-mode" type="button">Autoplay</button>
          <button id="save-game" type="button">Save</button>
          <button id="new-game" type="button">New Game</button>
        </div>
      </header>

      <main class="table-layout">
        <div class="board-wrap">
          <div id="board" class="board" aria-label="ATL Empire board"></div>
        </div>

        <nav class="panel-tabs" aria-label="Game panels">
          <button type="button" class="panel-tab active" data-panel-tab="turn">Turn</button>
          <button type="button" class="panel-tab" data-panel-tab="players">Players</button>
          <button type="button" class="panel-tab" data-panel-tab="space">Space</button>
          <button type="button" class="panel-tab" data-panel-tab="log">Log</button>
        </nav>

        <aside class="side-panel">
          <section class="turn-card" data-panel-section="turn">
            <div class="turn-head">
              <div>
                <p class="eyebrow">Turn</p>
                <h2 id="active-player">Player</h2>
              </div>
              <div id="dice" class="dice" aria-label="Dice">- -</div>
            </div>
            <p id="status-line" class="status-line">Roll to begin.</p>
            <div id="action-buttons" class="action-buttons"></div>
          </section>

          <section class="players-panel" data-panel-section="players">
            <h2>Players</h2>
            <div id="players-list" class="players-list"></div>
          </section>

          <section class="property-panel" data-panel-section="space">
            <h2>Space</h2>
            <div id="space-detail" class="space-detail"></div>
          </section>

          <section class="log-panel" data-panel-section="log">
            <h2>Game log</h2>
            <ol id="game-log" class="game-log"></ol>
          </section>
        </aside>
      </main>
    </section>
  </div>

  <dialog id="modal" class="modal">
    <div id="modal-content" class="modal-content"></div>
  </dialog>
  <div id="space-popover" class="space-popover hidden"></div>
  <div id="art-lightbox" class="art-lightbox hidden" aria-hidden="true">
    <div class="art-lightbox-frame">
      <img id="art-lightbox-image" class="art-lightbox-image" alt="">
    </div>
  </div>

  <script src="app.js?v=20260424e"></script>
</body>
</html>
